<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
</head>
<body>
    <h1>Random page</h1>
    <hr />
    <p>
        <div>The data below should be decrypted as <i>secret</i> using password <i><code>1234</code></i>:</div>
        <div style="margin: 1em; display: flex; flex-direction: column; gap: 0.5em;">
            <div><code id="data" style="white-space: pre; padding: 0.5em; border: solid; border-radius: 0.5em;">🔒SlxNQPKgblpvZ1XrXKIERTH8wYExXnTuHpQ1sxqroMtsgIfJiLINIJKVTYO7ZKO/PJk=</code></div>
             <div><a href="javascript:navigator.clipboard.writeText(document.getElementById('data').innerText);" style="font-size: small;">copy</a></div>
        </div>
        </div>
    </p>
    <hr />
    <p>
        <button onclick="import(`./ez-safe.js?do_not_cache=${new Date().getTime()}`);"">Run plain source</button>
    </p>
    <hr />
    <p>
        Run minified source: <a id="bookmarklet">ez-safe</a> (Save link as bookmark to install)
    </p>
    <script>
        fetch(`./ez-safe-min.js?do_not_cache=${new Date().getTime()}`).then(src => src.text()).then(src => {
            document.getElementById("bookmarklet").href = "javascript:" + encodeURIComponent(src);
        });
    </script>
</body>
</html>
