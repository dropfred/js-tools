<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
</head>
<body>
    <h1>Host page</h1>
    <p>
        Test plain <a id="plain" href="javascript:import(`./ez-pw.js?do_not_cache=${new Date().getTime()}`);">ez-pw</a> source on this page.
    </p>
    <p>
        Test minified <a id="bookmarklet">ez-pw</a> source on this page (<i><code>Right-Click &gt; Bookmark Link...</code></i> to install).
    </p>
    <p>
        <div>Should <i>not</i> be filled even if <code>🔏</code> has been clicked:</div>
        <input /> 
    </p>
    <p>
        <div>Should be filled if <code>🔏</code> has been clicked:</div>
        <input type="password" />
    </p>
    <p>
        <div>Should also be filled if <code>🔏</code> has been clicked:</div>
        <input type="password" />
    </p>
    <script>
        [...document.querySelectorAll("input")].forEach(i => i.onmouseenter = () => {i.title = i.value;});
        fetch("./ez-pw-min.js").then(src => src.text()).then(src => {document.getElementById("bookmarklet").href = "javascript:" + encodeURIComponent(src);});
    </script>
</body>
</html>
