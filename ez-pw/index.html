<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
</head>
<body>
    <h1>Host page</h1>
    <p>
        <button onclick="javascript:import(`./ez-pw.js?do_not_cache=${new Date().getTime()}`);">Test plain source</button>
    </p>
    <p>
        <a id="bookmarklet">ez-pw</a> as bookmarket (<i><code>Right-Click &gt; Bookmark Link...</code></i> to install).
    </p>
    <script>
        fetch("./ez-pw-min.js").then(src => src.text()).then(src => {document.getElementById("bookmarklet").href = "javascript:" + encodeURIComponent(src);});
    </script>
</body>
</html>
